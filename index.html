<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- Header -->
    <header class="header">
      <div class="container">
        <h1 class="logo">📋 Task Manager</h1>
        <div class="header-stats">
          <span class="stat">
            <span class="stat-label">Total:</span>
            <span class="stat-value" id="totalCount">0</span>
          </span>
          <span class="stat">
            <span class="stat-label">Active:</span>
            <span class="stat-value" id="activeCount">0</span>
          </span>
          <span class="stat">
            <span class="stat-label">Completed:</span>
            <span class="stat-value" id="completedCount">0</span>
          </span>
        </div>
      </div>
    </header>

    <!-- Main Container -->
    <main class="container">
      <!-- Task Input Form -->
      <section class="task-form-section">
        <form class="task-form" id="taskForm">
          <div class="form-row">
            <div class="form-group">
              <input
                type="text"
                id="taskTitle"
                placeholder="Task title *"
                required
                maxlength="100"
              />
              <span class="error-message" id="titleError"></span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <textarea
                id="taskDescription"
                placeholder="Task description (optional)"
                rows="3"
                maxlength="300"
              ></textarea>
              <span class="char-count" id="descCharCount">0/300</span>
            </div>
          </div>

          <div class="form-row form-row-inline">
            <div class="form-group">
              <label for="taskPriority">Priority</label>
              <select id="taskPriority">
                <option value="low">🟢 Low</option>
                <option value="medium" selected>🟡 Medium</option>
                <option value="high">🔴 High</option>
              </select>
            </div>

            <div class="form-group">
              <label for="taskDueDate">Due Date</label>
              <input type="date" id="taskDueDate" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="taskCategory">Category</label>
              <select id="taskCategory">
                <option value="general">📌 General</option>
                <option value="work">💼 Work</option>
                <option value="personal">👤 Personal</option>
                <option value="shopping">🛒 Shopping</option>
                <option value="health">💪 Health</option>
                <option value="education">📚 Education</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="submitBtn">
            <span id="btnText">➕ Add Task</span>
          </button>
        </form>
      </section>

      <!-- Controls Section -->
      <section class="controls">
        <!-- Search -->
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="🔍 Search tasks..."
          />
        </div>

        <!-- Filter Buttons -->
        <div class="filter-buttons">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="category-filter">
    <select id="categoryFilter">
        <option value="all">🏷️ All Categories</option>
        <option value="general">📌 General</option>
        <option value="work">💼 Work</option>
        <option value="personal">👤 Personal</option>
        <option value="shopping">🛒 Shopping</option>
        <option value="health">💪 Health</option>
        <option value="education">📚 Education</option>
    </select>
</div>

        <!-- Sort Dropdown -->
        <div class="sort-box">
          <select id="sortSelect">
            <option value="date-desc">Date (Newest First)</option>
            <option value="date-asc">Date (Oldest First)</option>
            <option value="priority">Priority (High to Low)</option>
            <option value="alpha">Alphabetically (A-Z)</option>
          </select>
        </div>

        <!-- Clear Completed -->
        <button class="btn btn-danger" id="clearCompletedBtn">
          🗑️ Clear Completed
        </button>
      </section>

      <!-- Tasks List -->
      <section class="tasks-section">
        <div class="tasks-header">
          <h2>Tasks</h2>
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">📭</div>
          <h3>No tasks yet</h3>
          <p>Add your first task to get started!</p>
        </div>

        <!-- Tasks Container -->
        <ul class="tasks-list" id="tasksList"></ul>
      </section>
    </main>

    <!-- Delete Confirmation Modal -->
    <div class="modal-overlay" id="deleteModal">
      <div class="modal">
        <h3>Delete Task?</h3>
        <p>
          Are you sure you want to delete this task? This action cannot be
          undone.
        </p>
        <div class="modal-actions">
          <button class="btn btn-secondary" id="cancelDelete">Cancel</button>
          <button class="btn btn-danger" id="confirmDelete">Delete</button>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
